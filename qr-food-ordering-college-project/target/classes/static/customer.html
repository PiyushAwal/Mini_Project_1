<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Menu - Order Food</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg: #0f0e0c;
      --card: #1a1814;
      --accent: #e8a923;
      --accent2: #c5832a;
      --text: #f0ead6;
      --muted: #7a7265;
      --border: #2c2820;
      --green: #4caf50;
      --red: #e53935;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ---- HEADER ---- */
    header {
      background: linear-gradient(135deg, #1a1814 0%, #0f0e0c 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .restaurant-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .table-badge {
      background: var(--accent);
      color: #000;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    /* ---- CATEGORY TABS ---- */
    .category-tabs {
      display: flex;
      gap: 8px;
      padding: 16px 20px;
      overflow-x: auto;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }

    .category-tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      padding: 8px 18px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.75rem;
    }

    .tab.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }

    /* ---- MENU GRID ---- */
    .menu-container { padding: 16px 20px 140px; }

    .category-section { margin-bottom: 32px; }

    .category-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--accent);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .menu-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }

    .menu-card:hover { transform: translateY(-2px); border-color: var(--accent2); }

    .menu-card-img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      background: linear-gradient(135deg, #2c2820, #1a1814);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .menu-card-body { padding: 10px; }

    .item-name {
      font-weight: 600;
      font-size: 0.88rem;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .item-desc {
      color: var(--muted);
      font-size: 0.73rem;
      line-height: 1.4;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .item-price {
      color: var(--accent);
      font-weight: 700;
      font-size: 0.95rem;
    }

    .add-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: #000;
      transition: background 0.2s, transform 0.1s;
    }

    .add-btn:hover { background: var(--accent2); transform: scale(1.1); }

    /* Quantity control */
    .qty-control {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .qty-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .qty-btn:hover { border-color: var(--accent); color: var(--accent); }

    .qty-value {
      font-weight: 600;
      font-size: 0.9rem;
      min-width: 18px;
      text-align: center;
    }

    /* ---- CART BAR ---- */
    .cart-bar {
      position: fixed;
      bottom: 20px;
      left: 16px; right: 16px;
      background: var(--accent);
      border-radius: 16px;
      padding: 14px 20px;
      display: none;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(232, 169, 35, 0.4);
      transition: transform 0.2s;
      z-index: 200;
    }

    .cart-bar.visible { display: flex; }
    .cart-bar:hover { transform: scale(1.01); }

    .cart-info { display: flex; flex-direction: column; }
    .cart-count { font-size: 0.75rem; font-weight: 600; color: rgba(0,0,0,0.7); }
    .cart-total { font-size: 1rem; font-weight: 700; color: #000; }
    .cart-cta { font-size: 0.9rem; font-weight: 700; color: #000; letter-spacing: 0.05em; }

    /* ---- CART MODAL ---- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 300;
      display: none;
      align-items: flex-end;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px 20px;
      border-top: 1px solid var(--border);
    }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 4px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 4px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .cart-item-name { font-weight: 500; font-size: 0.9rem; }
    .cart-item-price { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }
    .cart-item-subtotal { color: var(--accent); font-weight: 600; font-size: 0.9rem; margin-left: 12px; }

    .order-form { margin-top: 20px; }

    .form-group { margin-bottom: 14px; }

    .form-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      display: block;
    }

    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .bill-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 0.9rem;
    }

    .bill-total {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 4px;
    }

    .place-order-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 16px;
      letter-spacing: 0.04em;
      transition: background 0.2s;
    }

    .place-order-btn:hover { background: var(--accent2); }
    .place-order-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ---- ORDER STATUS ---- */
    .status-banner {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin: 12px 20px;
      padding: 14px 16px;
      display: none;
    }

    .status-banner.visible { display: block; }
    .status-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .status-value { font-size: 1rem; font-weight: 600; margin-top: 4px; }

    .status-PENDING { color: #ff9800; }
    .status-CONFIRMED { color: #2196f3; }
    .status-PREPARING { color: #9c27b0; }
    .status-READY { color: var(--green); }
    .status-SERVED { color: var(--muted); }
    .status-PAID { color: var(--muted); }

    /* Toast */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-60px);
      background: var(--green);
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      z-index: 999;
      transition: transform 0.3s;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      flex-direction: column;
      gap: 12px;
      color: var(--muted);
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .emoji-icon {
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100px;
    }
  </style>
</head>
<body>

<header>
  <div class="restaurant-name">🍽 Spice Route</div>
  <div class="table-badge" id="tableBadge">TABLE —</div>
</header>

<div class="status-banner" id="statusBanner">
  <div class="status-label">Your Latest Order Status</div>
  <div class="status-value" id="statusValue">—</div>
</div>

<div class="category-tabs" id="categoryTabs">
  <button class="tab active" data-cat="ALL">All Items</button>
</div>

<div class="menu-container" id="menuContainer">
  <div class="loading">
    <div class="spinner"></div>
    <span>Loading menu...</span>
  </div>
</div>

<div class="cart-bar" id="cartBar">
  <div class="cart-info">
    <span class="cart-count" id="cartCount">0 items</span>
    <span class="cart-total" id="cartTotal">₹0</span>
  </div>
  <span class="cart-cta">View Cart →</span>
</div>

<!-- Cart Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span>Your Cart</span>
      <button class="close-btn" id="closeModal">✕</button>
    </div>
    <div id="cartItems"></div>

    <div class="order-form">
      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input class="form-input" id="customerName" placeholder="Enter your name" type="text"/>
      </div>
      <div class="form-group">
        <label class="form-label">Special Instructions (optional)</label>
        <input class="form-input" id="specialInstructions" placeholder="e.g. No onions, extra spicy" type="text"/>
      </div>
    </div>

    <div id="billSummary" style="margin-top: 16px;"></div>

    <button class="place-order-btn" id="placeOrderBtn">Place Order</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ====== CONFIG ======
  const API_BASE = ''; // Same origin (Spring Boot serves these files)
  const params = new URLSearchParams(window.location.search);
  const tableNumber = parseInt(params.get('table')) || 1;

  let menuData = {}; // { STARTER: [...], MAIN: [...], ... }
  let cart = {}; // { itemId: { item, quantity } }
  let stompClient = null;
  let lastOrderId = null;

  // ====== INIT ======
  document.getElementById('tableBadge').textContent = `TABLE ${tableNumber}`;
  loadMenu();
  connectWebSocket();

  // ====== LOAD MENU ======
  async function loadMenu() {
    try {
      const res = await fetch(`${API_BASE}/api/menu/categories`);
      menuData = await res.json();
      renderMenu();
      renderTabs();
    } catch (e) {
      document.getElementById('menuContainer').innerHTML =
        '<div class="loading">⚠️ Failed to load menu. Please refresh.</div>';
    }
  }

  // ====== RENDER TABS ======
  function renderTabs() {
    const tabsDiv = document.getElementById('categoryTabs');
    const cats = Object.keys(menuData);
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'tab';
      btn.dataset.cat = cat;
      btn.textContent = cat.charAt(0) + cat.slice(1).toLowerCase();
      btn.onclick = () => scrollToCategory(cat, btn);
      tabsDiv.appendChild(btn);
    });
  }

  function scrollToCategory(cat, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`cat-${cat}`)?.scrollIntoView({ behavior: 'smooth' });
  }

  // ====== RENDER MENU ======
  const CATEGORY_EMOJI = { STARTER: '🥗', MAIN: '🍛', DESSERT: '🍮', DRINK: '🥤' };

  function renderMenu() {
    const container = document.getElementById('menuContainer');
    container.innerHTML = '';
    Object.entries(menuData).forEach(([cat, items]) => {
      const section = document.createElement('div');
      section.className = 'category-section';
      section.id = `cat-${cat}`;
      section.innerHTML = `<div class="category-title">${CATEGORY_EMOJI[cat] || '🍽'} ${cat}</div>`;
      const grid = document.createElement('div');
      grid.className = 'menu-grid';
      items.forEach(item => grid.appendChild(createMenuCard(item)));
      section.appendChild(grid);
      container.appendChild(section);
    });
  }

  function createMenuCard(item) {
    const card = document.createElement('div');
    card.className = 'menu-card';
    card.id = `card-${item.id}`;
    card.innerHTML = `
      <div class="emoji-icon">${CATEGORY_EMOJI[item.category] || '🍽'}</div>
      <div class="menu-card-body">
        <div class="item-name">${item.name}</div>
        <div class="item-desc">${item.description || ''}</div>
        <div class="item-footer">
          <span class="item-price">₹${item.price}</span>
          ${getCartControl(item)}
        </div>
      </div>`;
    return card;
  }

  function getCartControl(item) {
    const qty = cart[item.id]?.quantity || 0;
    if (qty === 0) {
      return `<button class="add-btn" onclick="addToCart(${item.id})">+</button>`;
    }
    return `<div class="qty-control">
      <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
      <span class="qty-value">${qty}</span>
      <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
    </div>`;
  }

  // ====== CART LOGIC ======
  function addToCart(itemId) {
    const item = findItemById(itemId);
    if (!item) return;
    cart[itemId] = { item, quantity: 1 };
    updateCard(itemId);
    updateCartBar();
  }

  function changeQty(itemId, delta) {
    if (!cart[itemId]) return;
    cart[itemId].quantity += delta;
    if (cart[itemId].quantity <= 0) delete cart[itemId];
    updateCard(itemId);
    updateCartBar();
  }

  function findItemById(id) {
    for (const items of Object.values(menuData)) {
      const found = items.find(i => i.id === id);
      if (found) return found;
    }
    return null;
  }

  function updateCard(itemId) {
    const card = document.getElementById(`card-${itemId}`);
    const item = findItemById(itemId);
    if (!card || !item) return;
    const footer = card.querySelector('.item-footer');
    const priceSpan = footer.querySelector('.item-price');
    footer.innerHTML = '';
    footer.appendChild(priceSpan || Object.assign(document.createElement('span'), {
      className: 'item-price', textContent: `₹${item.price}`
    }));
    footer.insertAdjacentHTML('beforeend', getCartControl(item));
  }

  function updateCartBar() {
    const items = Object.values(cart);
    const totalQty = items.reduce((s, e) => s + e.quantity, 0);
    const totalPrice = items.reduce((s, e) => s + e.quantity * parseFloat(e.item.price), 0);
    const bar = document.getElementById('cartBar');
    document.getElementById('cartCount').textContent = `${totalQty} item${totalQty !== 1 ? 's' : ''}`;
    document.getElementById('cartTotal').textContent = `₹${totalPrice.toFixed(2)}`;
    bar.classList.toggle('visible', totalQty > 0);
  }

  // ====== CART MODAL ======
  document.getElementById('cartBar').onclick = openModal;
  document.getElementById('closeModal').onclick = closeModal;
  document.getElementById('modalOverlay').onclick = (e) => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  };

  function openModal() {
    renderCartModal();
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function renderCartModal() {
    const cartDiv = document.getElementById('cartItems');
    const billDiv = document.getElementById('billSummary');
    const items = Object.values(cart);

    cartDiv.innerHTML = items.map(entry => `
      <div class="cart-item">
        <div>
          <div class="cart-item-name">${entry.item.name}</div>
          <div class="cart-item-price">₹${entry.item.price} × ${entry.quantity}</div>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
          <div class="qty-control" style="border:1px solid var(--border); border-radius:8px; padding:2px 6px;">
            <button class="qty-btn" onclick="changeQty(${entry.item.id},-1); renderCartModal();">−</button>
            <span class="qty-value">${entry.quantity}</span>
            <button class="qty-btn" onclick="changeQty(${entry.item.id},1); renderCartModal();">+</button>
          </div>
          <span class="cart-item-subtotal">₹${(entry.item.price * entry.quantity).toFixed(2)}</span>
        </div>
      </div>`).join('');

    const subtotal = items.reduce((s, e) => s + e.quantity * parseFloat(e.item.price), 0);
    const gst = subtotal * 0.05;
    const total = subtotal + gst;

    billDiv.innerHTML = `
      <div class="bill-row"><span>Subtotal</span><span>₹${subtotal.toFixed(2)}</span></div>
      <div class="bill-row"><span>GST (5%)</span><span>₹${gst.toFixed(2)}</span></div>
      <div class="bill-row bill-total"><span>TOTAL</span><span>₹${total.toFixed(2)}</span></div>`;
  }

  // ====== PLACE ORDER ======
  document.getElementById('placeOrderBtn').onclick = placeOrder;

  async function placeOrder() {
    const btn = document.getElementById('placeOrderBtn');
    const name = document.getElementById('customerName').value.trim() || 'Guest';
    const instructions = document.getElementById('specialInstructions').value.trim();
    const items = Object.entries(cart).map(([id, entry]) => ({
      menuItemId: id, quantity: entry.quantity
    }));

    if (items.length === 0) return showToast('Cart is empty!', 'red');

    btn.disabled = true;
    btn.textContent = 'Placing order...';

    try {
      const res = await fetch(`${API_BASE}/api/orders/place`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tableNumber, customerName: name, specialInstructions: instructions, items })
      });

      if (!res.ok) throw new Error('Order failed');

      const order = await res.json();
      lastOrderId = order.id;
      cart = {};

      // Reset all cards
      Object.keys(menuData).forEach(cat => {
        menuData[cat].forEach(item => updateCard(item.id));
      });

      updateCartBar();
      closeModal();
      showToast('🎉 Order placed successfully!');
      updateStatusBanner('PENDING');

    } catch (e) {
      showToast('Failed to place order. Try again.', 'red');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Place Order';
    }
  }

  // ====== WEBSOCKET (Listen for order status updates) ======
  function connectWebSocket() {
    const socket = new SockJS(`${API_BASE}/ws`);
    stompClient = Stomp.over(socket);
    stompClient.debug = null;
    stompClient.connect({}, () => {
      stompClient.subscribe(`/topic/table/${tableNumber}`, (msg) => {
        const order = JSON.parse(msg.body);
        if (order.id === lastOrderId) {
          updateStatusBanner(order.status);
        }
      });
    });
  }

  function updateStatusBanner(status) {
    const banner = document.getElementById('statusBanner');
    const val = document.getElementById('statusValue');
    const labels = {
      PENDING: '⏳ Order received – waiting for kitchen',
      CONFIRMED: '✅ Kitchen confirmed your order',
      PREPARING: '👨‍🍳 Your food is being prepared',
      READY: '🔔 Your order is ready! Serving shortly',
      SERVED: '🍽 Enjoy your meal!',
      CANCELLED: '❌ Order cancelled',
      PAID: '💳 Bill cleared. Thank you!'
    };
    val.className = `status-value status-${status}`;
    val.textContent = labels[status] || status;
    banner.classList.add('visible');
  }

  // ====== TOAST ======
  function showToast(msg, type = 'green') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = type === 'red' ? 'var(--red)' : 'var(--green)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
