# =================================================
# QR Food Ordering System
# Spring Boot 3.3.5 | Java 21 | PostgreSQL
# =================================================

# -------------------------------------------------
# SERVER
# -------------------------------------------------
server.port=8080

# Base URL used when generating QR codes
# Change this to your machine's IP when testing on mobile
# Example: app.base-url=http://192.168.1.10:8080
app.base-url=http://localhost:8080

# -------------------------------------------------
# POSTGRESQL DATABASE
# -------------------------------------------------
# Step 1: Open psql and run:  CREATE DATABASE qrfooddb;
# Step 2: Set your password below

spring.datasource.url=jdbc:postgresql://localhost:5432/qrfooddb
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------------------------------
# HIKARICP CONNECTION POOL
# -------------------------------------------------
spring.datasource.hikari.pool-name=QRFoodHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# -------------------------------------------------
# JPA / HIBERNATE
# -------------------------------------------------
spring.jpa.database=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# update  -> auto-alter tables on startup (keeps existing data)
# create  -> drop and recreate all tables (fresh start, loses data)
# validate-> only check schema, never change it (use in production)
spring.jpa.hibernate.ddl-auto=update

# Show formatted SQL in console (set to false in production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL schema
spring.jpa.properties.hibernate.default_schema=public

# Disable open-in-view warning
spring.jpa.open-in-view=false

# -------------------------------------------------
# STATIC RESOURCES (HTML pages served by Spring)
# -------------------------------------------------
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# -------------------------------------------------
# LOGGING
# -------------------------------------------------
logging.level.com.qrfood=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
